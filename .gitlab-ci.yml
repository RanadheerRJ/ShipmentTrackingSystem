stages:
  - build

build_job:
  stage: build
  image: node:20
  script:
    - node -v 
    - npm install
    - npm run build

build_frontend:
  stage: build
  image: node:20
  script:
   - node -v
   - npm install
   - npm run build

build_backend:
  stage: build
  image: node:20
  script:
   - node -v
   - cd backend
   - npm install
   - npm run build